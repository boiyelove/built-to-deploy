# ---
# Description: Builds and lints the React dashboard on PRs and pushes to main/dev
# Author: boiyelove
# Pass Criteria: Both must pass in dashboard/: (1) npm run build (clean build), (2) npm run lint (zero errors)
# ---

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
      - run: npm run lint
        working-directory: dashboard
