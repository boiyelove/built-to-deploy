# ---
# Description: Serial merge queue that merges all passing PRs, rebases remaining, closes conflicts
# Author: boiyelove
# Pass Criteria: N/A (operational workflow)
# ---

name: Auto Rebase PRs

on:
  push:
    branches: [dev]
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge-queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge all passing PRs sequentially
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MERGED=0
          REBASED=0
          CLOSED=0

          # Loop: merge one, rebase rest, repeat until no more mergeable
          while true; do
            # Get open PRs sorted by number (oldest first)
            prs=$(gh pr list --base dev --state open --json number,headRefName --jq 'sort_by(.number) | .[] | "\(.number) \(.headRefName)"')

            [ -z "$prs" ] && echo "No open PRs" && break

            MERGED_THIS_ROUND=false

            while read -r pr_number branch; do
              echo "--- PR #${pr_number} (${branch}) ---"

              ci_status=$(gh pr checks "$pr_number" --json bucket --jq '[.[] | select(.bucket != "pass")] | length' 2>/dev/null || echo "unknown")

              if [ "$ci_status" = "0" ]; then
                echo "CI passed -- squash merging"
                if gh pr merge "$pr_number" --squash; then
                  echo "Merged #${pr_number}"
                  MERGED=$((MERGED + 1))
                  MERGED_THIS_ROUND=true
                  sleep 2
                  break  # Break inner loop, refresh PR list, continue outer loop
                fi
              fi

              # Not mergeable yet -- try rebase
              git fetch origin "$branch" 2>/dev/null
              git checkout "$branch" 2>/dev/null || git checkout -b "$branch" "origin/$branch" 2>/dev/null
              if ! git rev-parse --verify "$branch" >/dev/null 2>&1; then
                echo "Could not checkout $branch, skipping"
                git checkout dev 2>/dev/null
                continue
              fi

              git fetch origin dev
              if git rebase origin/dev 2>/dev/null; then
                git push --force-with-lease origin "$branch" 2>/dev/null
                echo "Rebased successfully"
                REBASED=$((REBASED + 1))
              else
                git rebase --abort
                gh pr close "$pr_number" --comment "Auto-closed: rebase conflict with dev. Issue will be re-queued for a fresh attempt."
                echo "Conflict -- PR closed"
                CLOSED=$((CLOSED + 1))
              fi

              git checkout dev 2>/dev/null
            done <<< "$prs"

            # If nothing merged this round, stop
            [ "$MERGED_THIS_ROUND" = "false" ] && break

            # Refresh dev after merge
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev
          done

          echo ""
          echo "=== Summary: merged=$MERGED rebased=$REBASED closed=$CLOSED ==="

      - name: Delete orphaned kiro branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune origin

          for branch in $(git branch -r | grep 'origin/kiro/' | sed 's|origin/||'); do
            pr_state=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' 2>/dev/null)
            if [ -z "$pr_state" ]; then
              git push origin --delete "$branch" 2>/dev/null && echo "Deleted $branch" || echo "Failed to delete $branch"
            fi
          done
